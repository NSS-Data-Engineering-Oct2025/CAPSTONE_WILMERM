dbt_project:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'localhost') }}"
      port: "{{ env_var('POSTGRES_PORT', '5433') | int }}"
      user: "{{ env_var('POSTGRES_USER', 'health_user') }}"
      pass: "{{ env_var('POSTGRES_PASSWORD', 'health_pass') }}"
      dbname: "{{ env_var('POSTGRES_DB', 'health_platform') }}"
      schema: public
      threads: 4
