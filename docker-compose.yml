services:
  postgres:
    image: postgres:16
    container_name: health_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-health_platform}
      POSTGRES_USER: ${POSTGRES_USER:-health_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-health_pass}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-health_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
