name: Scheduled Pipeline

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

jobs:
  ingest-and-transform:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: health_platform
          POSTGRES_USER: health_user
          POSTGRES_PASSWORD: health_pass
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U health_user"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5433"
      POSTGRES_DB: health_platform
      POSTGRES_USER: health_user
      POSTGRES_PASSWORD: health_pass
      EPA_AIRNOW_API_KEY: ${{ secrets.EPA_AIRNOW_API_KEY }}
      USDA_API_KEY: ${{ secrets.USDA_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Run EPA ingestion
        run: uv run python -m src.ingestion.epa_airnow

      - name: Run CDC ingestion
        run: uv run python -m src.ingestion.cdc_chronic

      - name: Run USDA ingestion
        run: uv run python -m src.ingestion.usda_fooddata

      - name: Run Census ingestion
        run: uv run python -m src.ingestion.census

      - name: Run Blue Zones ingestion
        run: uv run python -m src.ingestion.blue_zones

      - name: Run dbt pipeline
        working-directory: dbt_project
        run: |
          uv run dbt seed --profiles-dir .
          uv run dbt run --profiles-dir .
          uv run dbt test --profiles-dir .
